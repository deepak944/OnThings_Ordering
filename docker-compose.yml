services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-onthings_root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-flipkart_clone_db}
      MYSQL_USER: ${MYSQL_USER:-onthings_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-onthings_password}
      MYSQL_INITDB_SKIP_TZINFO: "1"
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-onthings_root_password}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: ./backend/onthings-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      CLIENT_URL: ${CLIENT_URL:-http://localhost:8080}
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-flipkart_clone_db}
      DB_USER: ${MYSQL_USER:-onthings_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-onthings_password}
      DB_WAIT_MAX_ATTEMPTS: ${DB_WAIT_MAX_ATTEMPTS:-30}
      DB_WAIT_DELAY_MS: ${DB_WAIT_DELAY_MS:-2000}
      JWT_SECRET: ${JWT_SECRET:-change_this_in_docker_env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:5001/api/auth/google/callback}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-OnThings <no-reply@onthings.com>}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-admin@example.com}
      AUTO_SYNC_DB: ${AUTO_SYNC_DB:-true}
      AUTO_START_CHATBOT: ${AUTO_START_CHATBOT:-false}
      CHATBOT_API_URL: ${CHATBOT_API_URL:-http://127.0.0.1:8000/chat}
      PUBLIC_FRONTEND_URL: http://localhost:${FRONTEND_PORT:-8080}
      PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-5001}/api
      PUBLIC_HEALTH_URL: http://localhost:${BACKEND_PORT:-5001}/api/health
      PUBLIC_DB_HOST: 127.0.0.1
      PUBLIC_DB_PORT: ${MYSQL_PORT:-3307}
      PUBLIC_DB_NAME: ${MYSQL_DATABASE:-flipkart_clone_db}
      PUBLIC_DB_USER: ${MYSQL_USER:-onthings_user}
    ports:
      - "${BACKEND_PORT:-5001}:5000"

  frontend:
    build:
      context: ./frontend/app
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5001/api}
        VITE_RAZORPAY_KEY_ID: ${VITE_RAZORPAY_KEY_ID:-rzp_test_xxxxxxxxxx}
        VITE_CHATBOT_API_URL: ${VITE_CHATBOT_API_URL:-http://localhost:5001/api/chatbot/chat}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      PUBLIC_FRONTEND_URL: http://localhost:${FRONTEND_PORT:-8080}
      PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-5001}/api
      PUBLIC_HEALTH_URL: http://localhost:${BACKEND_PORT:-5001}/api/health
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  mysql_data:
